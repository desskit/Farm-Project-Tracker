# Farm Project Tracker — self-hosted stack (app + Caddy reverse proxy).
# Copy .env.example to .env and fill it in, then: docker compose up -d --build
services:
  app:
    build: .
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: file:/data/app.db
      UPLOAD_DIR: /data/uploads
      TZ: ${TZ:-UTC}
      PUBLIC_URL: ${PUBLIC_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-Admin}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      # optional integrations (blank = feature disabled)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - farmdata:/data
    expose:
      - "3000"
    restart: unless-stopped

  caddy:
    image: caddy:2
    depends_on:
      - app
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    restart: unless-stopped

volumes:
  farmdata:
  caddydata:
  caddyconfig:
