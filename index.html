<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2f6f4f" />
  <title>Farm Project Tracker</title>
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <span class="brand-mark">🌾</span>
        <span class="brand-name">Farm Tracker</span>
      </div>
      <div id="user-area" class="user-area"></div>
    </div>
  </header>

  <main id="view" class="view"></main>

  <nav class="nav" id="nav">
    <button class="nav-btn" data-action="switch-view" data-view="dashboard">
      <span class="nav-ico">🏠<span class="nav-badge" id="nav-badge" hidden></span></span><span class="nav-lbl">Today</span>
    </button>
    <button class="nav-btn" data-action="switch-view" data-view="chores">
      <span class="nav-ico">🔁</span><span class="nav-lbl">Chores</span>
    </button>
    <button class="nav-btn" data-action="switch-view" data-view="maintenance">
      <span class="nav-ico">🔧</span><span class="nav-lbl">Upkeep</span>
    </button>
    <button class="nav-btn" data-action="switch-view" data-view="projects">
      <span class="nav-ico">📋</span><span class="nav-lbl">Projects</span>
    </button>
    <button class="nav-btn" data-action="switch-view" data-view="more">
      <span class="nav-ico">⋯<span class="nav-badge" id="more-badge" hidden></span></span><span class="nav-lbl">More</span>
    </button>
  </nav>

  <div id="modal" class="modal" hidden>
    <div class="modal-backdrop" data-action="close-modal"></div>
    <div class="modal-card" role="dialog" aria-modal="true">
      <div class="modal-head">
        <h2 id="modal-title"></h2>
        <button class="icon-btn" data-action="close-modal" aria-label="Close">✕</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script src="./js/store.js"></script>
  <script src="./js/qrcode.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
