name: Deploy to GitHub Pages

# The whole repo root is a static site (no build step). This workflow publishes it
# via GitHub Actions once Pages is set to "GitHub Actions" as its source.
#
# Note: the `github-pages` environment allows deploys from the default branch by
# default. Until this branch is merged to the default branch, the quickest way to
# preview is Settings -> Pages -> "Deploy from a branch" -> pick this branch, root.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
